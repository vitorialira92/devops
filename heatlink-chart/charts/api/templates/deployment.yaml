apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.api.name }}
  labels:
    app: {{ .Values.global.api.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.global.api.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.global.api.name }}
    spec:
      containers:
        - name: {{ .Values.global.api.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.api.name }}-configmap
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.api.name }}-configmap
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.api.name }}-configmap
                  key: DB_NAME
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.api.name }}-configmap
                  key: REDIS_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.name }}-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.name }}-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
