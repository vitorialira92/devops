apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.global.postgres.name }}-pv-volume
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/{{ .Release.Name }}"
    type: DirectoryOrCreate
