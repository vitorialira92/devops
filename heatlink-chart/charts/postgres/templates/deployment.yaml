apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.postgres.name }}
  labels:
    app: {{ .Values.global.postgres.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.global.postgres.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Values.global.postgres.name }}
    spec:
      containers:
        - name: {{ .Values.global.postgres.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.name }}-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.name }}-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.name }}-secret
                  key: POSTGRES_PASSWORD
            # PGDATA em subdiretorio evita conflito com lost+found do volume
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.global.postgres.database }}"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: {{ .Values.global.postgres.name }}-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: {{ .Values.global.postgres.name }}-storage
          persistentVolumeClaim:
            claimName: {{ .Values.global.postgres.name }}-pv-claim
