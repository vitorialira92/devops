spring.application.name=heatlink.backend

spring.datasource.url=jdbc:postgresql://localhost:5432/heatlink
spring.datasource.username=heatlink
spring.datasource.password=heatlink
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=localhost
spring.data.redis.port=6379

heatlink.cache.ttl-seconds=30