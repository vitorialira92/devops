spring.application.name=heatlink.backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:heatlink}
spring.datasource.username=${DB_USER:heatlink}
spring.datasource.password=${DB_PASS:heatlink}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

heatlink.cache.ttl-seconds=30